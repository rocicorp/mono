name: Signed Commit Authors

# Require the "Verify Signed Commit Authors" check in branch protection to enforce this.
# The verifier and SSH signing policy are owned by rocicorp/.github. This
# intentionally uses pull_request_target but only checks out trusted base code
# and never executes code from the PR.

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Signed Commit Authors
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout trusted base code and fetch commits.
    steps:
      - name: Check out trusted base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Verify signed commit authors
        uses: rocicorp/.github/.github/actions/verify-signed-commit-authors@mlaw/signers # zizmor: ignore[unpinned-uses] Cross-repo staging branch; pin after the shared action lands.
        with:
          github-token: ${{ github.token }}
