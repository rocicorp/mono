name: Signed Commit Authors

# Require the "Verify Signed Commit Authors" check in branch protection to enforce this.
# SSH signing keys are downloaded from the private security-policy repository.
# SECURITY_POLICY_REPO_TOKEN must be a read-only token with contents access to
# the same-owner security-policy repository. This intentionally uses
# pull_request_target but only checks out trusted base code and never executes
# code from the PR.

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.number }}'
  cancel-in-progress: true

env:
  # Source of the OpenSSH allowed signers file. Authorization is by key presence.
  SIGNED_COMMIT_POLICY_REPOSITORY: ${{ github.repository_owner }}/security-policy
  SIGNED_COMMIT_POLICY_REF: main
  SIGNED_COMMIT_ALLOWED_SIGNERS_PATH: .github/signing/allowed_signers

jobs:
  verify:
    name: Verify Signed Commit Authors
    runs-on: ubuntu-latest
    environment: signed-commit-policy
    permissions:
      contents: read # Required to checkout the trusted verifier and fetch commits.
    steps:
      - name: Check out trusted verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Verify signed commit authors
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SECURITY_POLICY_REPO_TOKEN: ${{ secrets.SECURITY_POLICY_REPO_TOKEN }}
        run: node .github/scripts/verify-signed-commit-authors.mjs
