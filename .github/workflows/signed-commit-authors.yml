name: Signed Commit Authors

# Require the "Verify Signed Commit Authors" check in branch protection to enforce this.
# SSH signing keys are downloaded from the private security-policy repository.
# SECURITY_POLICY_REPO_TOKEN must be a read-only token with contents access to
# the same-owner security-policy repository. This intentionally uses
# pull_request_target but only checks out trusted base code and never executes
# code from the PR.

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.number }}'
  cancel-in-progress: true

env:
  # Source of the OpenSSH allowed signers file. Authorization is by key presence.
  SIGNED_COMMIT_POLICY_REPOSITORY: ${{ github.repository_owner }}/security-policy
  SIGNED_COMMIT_POLICY_REF: main
  SIGNED_COMMIT_ALLOWED_SIGNERS_PATH: .github/signing/allowed_signers

  # Local runtime copy downloaded from the private policy repository.
  SIGNED_COMMIT_ALLOWED_SIGNERS_FILE: .github/signing/allowed_signers

jobs:
  verify:
    name: Verify Signed Commit Authors
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout the trusted verifier and fetch commits.
    steps:
      - name: Check out trusted verifier
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Download signing policy
        env:
          SECURITY_POLICY_REPO_TOKEN: ${{ secrets.SECURITY_POLICY_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SECURITY_POLICY_REPO_TOKEN:-}" ]]; then
            echo "::error::Missing SECURITY_POLICY_REPO_TOKEN secret. It must read ${SIGNED_COMMIT_POLICY_REPOSITORY}."
            exit 1
          fi

          mkdir -p "$(dirname "$SIGNED_COMMIT_ALLOWED_SIGNERS_FILE")"

          curl --fail-with-body --silent --show-error --location \
            --header "Accept: application/vnd.github.raw+json" \
            --header "Authorization: Bearer ${SECURITY_POLICY_REPO_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${SIGNED_COMMIT_POLICY_REPOSITORY}/contents/${SIGNED_COMMIT_ALLOWED_SIGNERS_PATH}?ref=${SIGNED_COMMIT_POLICY_REF}" \
            --output "$SIGNED_COMMIT_ALLOWED_SIGNERS_FILE"

          if [[ ! -s "$SIGNED_COMMIT_ALLOWED_SIGNERS_FILE" ]]; then
            echo "::error::Downloaded signing policy is empty: ${SIGNED_COMMIT_POLICY_REPOSITORY}:${SIGNED_COMMIT_ALLOWED_SIGNERS_PATH}@${SIGNED_COMMIT_POLICY_REF}"
            exit 1
          fi

      - name: Fetch PR commits
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_COMMIT_COUNT: ${{ github.event.pull_request.commits }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$PR_COMMIT_COUNT" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid PR commit count: ${PR_COMMIT_COUNT}"
            exit 1
          fi
          if [[ ! "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid PR number: ${PR_NUMBER}"
            exit 1
          fi
          if [[ ! "$PR_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::Invalid PR head SHA: ${PR_HEAD_SHA}"
            exit 1
          fi
          if [[ -z "${GITHUB_TOKEN:-}" ]]; then
            echo "::error::Missing GITHUB_TOKEN."
            exit 1
          fi

          depth=$(( PR_COMMIT_COUNT + 1 ))
          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w 0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth="$depth" origin \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"

          git cat-file -e "${PR_HEAD_SHA}^{commit}"

      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');
            const {execFileSync} = require('node:child_process');

            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('No pull_request payload.');
              return;
            }

            const workspace = process.env.GITHUB_WORKSPACE || process.cwd();
            const allowedSignersPath = path.resolve(
              workspace,
              process.env.SIGNED_COMMIT_ALLOWED_SIGNERS_FILE ||
                '.github/signing/allowed_signers',
            );
            const workspaceRoot = path.resolve(workspace);
            if (
              allowedSignersPath !== workspaceRoot &&
              !allowedSignersPath.startsWith(`${workspaceRoot}${path.sep}`)
            ) {
              core.setFailed(
                `SIGNED_COMMIT_ALLOWED_SIGNERS_FILE must stay inside the workspace: ${allowedSignersPath}`,
              );
              return;
            }

            if (!fs.existsSync(allowedSignersPath)) {
              core.setFailed(
                `Missing SSH allowed signers file at ${path.relative(workspace, allowedSignersPath)}. It should have been downloaded from ${process.env.SIGNED_COMMIT_POLICY_REPOSITORY}:${process.env.SIGNED_COMMIT_ALLOWED_SIGNERS_PATH}.`,
              );
              return;
            }

            const activeSignerLines = fs
              .readFileSync(allowedSignersPath, 'utf8')
              .split(/\r?\n/)
              .map(line => line.trim())
              .filter(line => line && !line.startsWith('#'));

            if (!activeSignerLines.length) {
              core.setFailed(
                `${path.relative(workspace, allowedSignersPath)} has no active signing keys.`,
              );
              return;
            }

            const git = args => {
              try {
                return {
                  ok: true,
                  stdout: execFileSync('git', args, {
                    cwd: workspace,
                    encoding: 'utf8',
                    stdio: ['ignore', 'pipe', 'pipe'],
                  }),
                  stderr: '',
                };
              } catch (error) {
                return {
                  ok: false,
                  stdout: String(error.stdout ?? ''),
                  stderr: String(error.stderr ?? ''),
                };
              }
            };

            const signingGit = args =>
              git([
                '-c',
                `gpg.ssh.allowedSignersFile=${allowedSignersPath}`,
                '-c',
                'gpg.minTrustLevel=fully',
                ...args,
              ]);

            const verifyAllowedSignature = sha => {
              const verify = signingGit(['verify-commit', sha]);
              if (!verify.ok) {
                const details = `${verify.stdout}\n${verify.stderr}`.trim();
                return {
                  allowed: false,
                  detail: details || 'signature is missing or not made by an allowed SSH key',
                };
              }

              const metadata = signingGit([
                'show',
                '-s',
                '--format=%GS%x00%GK%x00%GT',
                sha,
              ]);
              if (!metadata.ok) {
                const details = `${metadata.stdout}\n${metadata.stderr}`.trim();
                return {
                  allowed: false,
                  detail: details || 'could not read signature metadata',
                };
              }

              const [principal = '', fingerprint = '', trust = ''] =
                metadata.stdout.trimEnd().split('\0');
              if (trust !== 'fully') {
                return {
                  allowed: false,
                  detail: `signature trust is ${trust || 'unknown'}, not fully trusted`,
                };
              }
              if (!fingerprint) {
                return {
                  allowed: false,
                  detail: 'signature did not report a key fingerprint',
                };
              }

              return {
                allowed: true,
                fingerprint,
                principal,
              };
            };

            core.info(
              `Checking signatures against ${activeSignerLines.length} allowed SSH key entr${activeSignerLines.length === 1 ? 'y' : 'ies'}.`,
            );
            core.info(`Checking ${pr.commits} commit(s) on PR #${pr.number}.`);

            const revList = git([
              'rev-list',
              '--reverse',
              `${pr.base.sha}..${pr.head.sha}`,
            ]);
            if (!revList.ok) {
              const details = `${revList.stdout}\n${revList.stderr}`.trim();
              core.setFailed(
                `Could not list PR commits locally: ${details || 'git rev-list failed'}`,
              );
              return;
            }

            const commits = revList.stdout
              .trim()
              .split(/\r?\n/)
              .filter(Boolean);
            if (typeof pr.commits === 'number' && commits.length !== pr.commits) {
              core.setFailed(
                `Expected ${pr.commits} PR commit(s) from the pull_request payload, but git rev-list found ${commits.length}.`,
              );
              return;
            }

            const commitSubject = sha => {
              const subject = git(['show', '-s', '--format=%s', sha]);
              if (subject.ok) {
                return subject.stdout.trim();
              }
              return '(could not read commit subject)';
            };

            const failures = [];
            for (const commit of commits) {
              const shortSha = commit.slice(0, 12);
              const subject = commitSubject(commit);
              const signatureCheck = verifyAllowedSignature(commit);

              if (!signatureCheck.allowed) {
                failures.push({
                  sha: shortSha,
                  subject,
                  problem: `signature is not made by an allowed SSH signing key: ${signatureCheck.detail}`,
                });
                continue;
              }

              core.info(
                `${shortSha}: allowed SSH signature for ${signatureCheck.principal || '(unnamed principal)'} using ${signatureCheck.fingerprint}`,
              );
            }

            if (failures.length) {
              const details = failures
                .map(f => `- ${f.sha}: ${f.problem} - ${f.subject}`)
                .join('\n');
              core.setFailed(
                `Signed commit author check failed for ${failures.length}/${commits.length} commit(s):\n${details}`,
              );
              return;
            }

            core.notice(
              `All ${commits.length} PR commit(s) are signed by allowed SSH keys.`,
            );
