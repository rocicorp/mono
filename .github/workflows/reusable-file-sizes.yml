name: Reusable File Sizes Workflow

on:
  workflow_call:
    inputs:
      upload_results:
        required: false
        type: boolean
        default: true
        description: 'Whether to upload file size results to Bencher'
      is_pr:
        required: false
        type: boolean
        default: false
        description: 'Whether this is a PR run'
      base_ref:
        required: false
        type: string
        description: 'Base ref for PR runs'
      head_ref:
        required: false
        type: string
        description: 'Head ref for PR runs'
      base_sha:
        required: false
        type: string
        description: 'Base SHA for PR runs'
    secrets:
      BENCHER_API_TOKEN:
        required: false

jobs:
  build_file_sizes:
    name: File Sizes
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Build npm zero package
        working-directory: packages/zero
        run: |
          npm pack --pack-destination ./out
          mv ./out/*.tgz ./out/zero-package.tgz

      - name: Build zero client single file package
        working-directory: packages/zero
        run: npx tsx tool/build.ts --bundle-sizes

      - name: Compress
        working-directory: packages/zero
        run: brotli out/zero.js

      - name: Upload file size outputs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: file-size-output
          path: |
            packages/zero/out/zero-package.tgz
            packages/zero/out/zero.js.br
            packages/zero/out/zero.js
          if-no-files-found: error
          retention-days: 1

  upload:
    name: Upload File Sizes
    if: ${{ inputs.upload_results }}
    needs: build_file_sizes
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download file size outputs
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: file-size-output
          path: packages/zero/out

      - uses: bencherdev/bencher@a495d2b34f9ab1f3b0f581848f85b389fb0bcda0 # main

      - name: Upload benchmarks results to bencher.dev
        if: ${{ !inputs.is_pr }}
        working-directory: packages/zero
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          bencher run \
          --project zero \
          --token "$BENCHER_API_TOKEN" \
          --adapter json \
          --github-actions "$GITHUB_TOKEN" \
          --start-point main \
          --threshold-measure file-size \
          --threshold-test percentage \
          --threshold-upper-boundary 0.02 \
          --threshold-max-sample-size 2 \
          --err \
          --file-size out/zero-package.tgz \
          --file-size out/zero.js.br \
          --file-size out/zero.js

      - name: Upload PR benchmarks results to bencher.dev
        if: ${{ inputs.is_pr }}
        working-directory: packages/zero
        env:
          BASE_REF: ${{ inputs.base_ref }}
          BASE_SHA: ${{ inputs.base_sha }}
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ inputs.head_ref }}
        run: |
          bencher run \
          --project zero \
          --token "$BENCHER_API_TOKEN" \
          --adapter json \
          --github-actions "$GITHUB_TOKEN" \
          --ci-id size \
          --branch "$HEAD_REF" \
          --start-point "$BASE_REF" \
          --start-point-hash "$BASE_SHA" \
          --start-point-clone-thresholds \
          --start-point-reset \
          --threshold-measure file-size \
          --threshold-test percentage \
          --threshold-upper-boundary 0.02 \
          --threshold-max-sample-size 2 \
          --err \
          --file-size out/zero-package.tgz \
          --file-size out/zero.js.br \
          --file-size out/zero.js
