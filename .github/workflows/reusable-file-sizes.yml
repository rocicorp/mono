name: Reusable File Sizes Workflow

on:
  workflow_call:
    inputs:
      is_pr:
        required: false
        type: boolean
        default: false
        description: 'Whether this is a PR run'
      base_ref:
        required: false
        type: string
        description: 'Base ref for PR runs'
      head_ref:
        required: false
        type: string
        description: 'Head ref for PR runs'
      base_sha:
        required: false
        type: string
        description: 'Base SHA for PR runs'
    secrets:
      BENCHER_API_TOKEN:
        required: true
      TURBO_TOKEN:
        required: false

jobs:
  file_sizes:
    name: File Sizes
    permissions:
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: rocicorp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - uses: bencherdev/bencher@main

      - run: npm ci
      - run: npm run build

      - name: Build npm zero package
        working-directory: packages/zero
        run: |
          npm pack --pack-destination ./out
          mv ./out/*.tgz ./out/zero-package.tgz

      - name: Build zero client single file package
        working-directory: packages/zero
        run: npx tsx tool/build.ts --bundle-sizes

      - name: Compress
        working-directory: packages/zero
        run: brotli out/zero.js

      - name: Upload benchmarks results to bencher.dev (main)
        if: ${{ !inputs.is_pr }}
        working-directory: packages/zero
        run: |
          bencher run \
          --project zero \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --adapter json \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          --start-point main \
          --threshold-measure file-size \
          --threshold-test percentage \
          --threshold-upper-boundary 0.02 \
          --threshold-max-sample-size 2 \
          --err \
          --file-size out/zero-package.tgz \
          --file-size out/zero.js.br \
          --file-size out/zero.js

      - name: Upload PR benchmarks results to bencher.dev
        if: ${{ inputs.is_pr }}
        working-directory: packages/zero
        run: |
          bencher run \
          --project zero \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --adapter json \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          --ci-id size \
          --branch "${{ inputs.head_ref }}" \
          --start-point "${{ inputs.base_ref }}" \
          --start-point-hash '${{ inputs.base_sha }}' \
          --start-point-clone-thresholds \
          --start-point-reset \
          --threshold-measure file-size \
          --threshold-test percentage \
          --threshold-upper-boundary 0.02 \
          --threshold-max-sample-size 2 \
          --err \
          --file-size out/zero-package.tgz \
          --file-size out/zero.js.br \
          --file-size out/zero.js
