name: Promote Zero Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable Zero version to promote, e.g. 1.8.0
        required: true
        type: string

permissions: {}

concurrency:
  group: zero-promote-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Validate release
        id: validate
        env:
          VERSION: ${{ inputs.version }}
          WORKFLOW_REF_NAME: ${{ github.ref_name }}
        run: node --experimental-strip-types --no-warnings scripts/src/promote-validate.ts

  promote-npm:
    name: Promote npm latest
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: zero-promote-npm
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.5.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - name: Move npm latest dist-tag
        run: pnpm dist-tag add "@rocicorp/zero@$VERSION" latest

  promote-docker:
    name: Promote Docker latest
    runs-on: ubuntu-latest
    needs: [validate, promote-npm]
    environment:
      name: zero-promote-docker
    permissions:
      id-token: write # Required for cosign keyless signing.
      packages: write # Required to move the GHCR latest tag.
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote Docker tags
        run: |
          docker buildx imagetools create -t "rocicorp/zero:latest" "rocicorp/zero:$VERSION"
          docker buildx imagetools create -t "ghcr.io/rocicorp/zero:latest" "ghcr.io/rocicorp/zero:$VERSION"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Docker latest tags
        run: |
          cosign sign --yes "docker.io/rocicorp/zero:latest"
          cosign sign --yes "ghcr.io/rocicorp/zero:latest"

  promote-git:
    name: Promote git latest tag
    runs-on: ubuntu-latest
    needs: [validate, promote-npm, promote-docker]
    permissions:
      contents: write # Required to move the git latest tag.
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout repository
        # zizmor: ignore[artipacked] Tag push intentionally uses the scoped GITHUB_TOKEN from this checkout.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Move git latest tag
        run: |
          git tag --force latest "zero/v$VERSION"
          git push --force origin refs/tags/latest:refs/tags/latest
