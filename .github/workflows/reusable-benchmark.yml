name: Reusable Benchmark Workflow

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
        description: 'Package name (e.g., zero-client, replicache)'
      working_directory:
        required: true
        type: string
        description: 'Working directory (e.g., packages/zero-client)'
      upload_results:
        required: false
        type: boolean
        default: true
        description: 'Whether to upload benchmark results to Bencher'
      ci_id:
        required: false
        type: string
        description: 'CI ID for PR runs'
      is_pr:
        required: false
        type: boolean
        default: false
        description: 'Whether this is a PR run'
      base_ref:
        required: false
        type: string
        description: 'Base ref for PR runs'
      head_ref:
        required: false
        type: string
        description: 'Head ref for PR runs'
      base_sha:
        required: false
        type: string
        description: 'Base SHA for PR runs'
    secrets:
      BENCHER_API_TOKEN:
        required: false

jobs:
  benchmark:
    name: ${{ inputs.package_name }} Benchmarks
    permissions:
      contents: read
    runs-on: [self-hosted, benchmark]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x

      - run: npm ci

      - name: Run benchmarks
        working-directory: ${{ inputs.working_directory }}
        run: npm run --silent bench:bmf:silent > output.json

      - name: Upload benchmark output
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: benchmark-output-${{ inputs.package_name }}
          path: ${{ inputs.working_directory }}/output.json
          if-no-files-found: error
          retention-days: 1

  upload:
    name: Upload ${{ inputs.package_name }} Benchmarks
    if: ${{ inputs.upload_results }}
    needs: benchmark
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download benchmark output
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: benchmark-output-${{ inputs.package_name }}
          path: benchmark-output

      - uses: bencherdev/bencher@a495d2b34f9ab1f3b0f581848f85b389fb0bcda0 # main

      - name: Upload benchmark results
        if: ${{ !inputs.is_pr }}
        working-directory: benchmark-output
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cat output.json |\
          bencher run \
          --project zero \
          --testbed self-hosted-metal \
          --token "$BENCHER_API_TOKEN" \
          --adapter json \
          --github-actions "$GITHUB_TOKEN" \
          --start-point main \
          --threshold-measure throughput \
          --threshold-test t_test \
          --threshold-lower-boundary 0.99 \
          --threshold-min-sample-size 3 \
          --threshold-max-sample-size 12 \
          --err

      - name: Upload benchmark results (PR)
        if: ${{ inputs.is_pr }}
        working-directory: benchmark-output
        env:
          BASE_REF: ${{ inputs.base_ref }}
          BASE_SHA: ${{ inputs.base_sha }}
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          CI_ID: ${{ inputs.ci_id }}
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ inputs.head_ref }}
        run: |
          cat output.json |\
          bencher run \
          --project zero \
          --testbed self-hosted-metal \
          --token "$BENCHER_API_TOKEN" \
          --adapter json \
          --github-actions "$GITHUB_TOKEN" \
          --ci-id "$CI_ID" \
          --branch "$HEAD_REF" \
          --start-point "$BASE_REF" \
          --start-point-hash "$BASE_SHA" \
          --start-point-clone-thresholds \
          --start-point-reset \
          --threshold-measure throughput \
          --threshold-test t_test \
          --threshold-lower-boundary 0.99 \
          --threshold-min-sample-size 3 \
          --threshold-max-sample-size 12 \
          --err
