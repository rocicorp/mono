name: Bencher

on:
  push:
    branches: main

jobs:
  playwright-install:
    name: Install Playwright
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6

        with:
          node-version: 24.x
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/playwright-install

  perf:
    name: Perf
    needs: playwright-install
    uses: ./.github/workflows/reusable-benchmark.yml
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: 'shared'
            directory: 'packages/shared'
          - name: 'zero-client'
            directory: 'packages/zero-client'
          - name: 'zero-cache'
            directory: 'packages/zero-cache'
          - name: 'zql-benchmarks'
            directory: 'packages/zql-benchmarks'
    with:
      package_name: ${{ matrix.package.name }}
      working_directory: ${{ matrix.package.directory }}
    secrets:
      BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
