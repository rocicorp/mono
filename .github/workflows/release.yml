name: Release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        type: choice
        options:
          - canary
          - stable
      ref:
        description: Git ref to build the release from
        required: true
        type: string
      promote_latest:
        description: Promote the published version to npm and Docker latest (stable only)
        required: false
        type: boolean
        default: true
      dry_run:
        description: Build but skip git push, npm publish, and Docker push
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release-canary'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.pull_request.base.ref }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Run release
        id: release
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'canary' }}
          REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.pull_request.base.ref }}
          DRY_RUN: ${{ inputs.dry_run == true && '--dry-run' || '' }}
        run: |
          set -euo pipefail

          if [[ ! "$REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Invalid ref: $REF" >&2
            exit 1
          fi

          output=$(node packages/zero/tool/release.ts "$MODE" "$REF" --yes $DRY_RUN 2>&1 | tee /dev/stderr)
          version=$(echo "$output" | grep -oP '(?:Published|Would publish) @rocicorp/zero@\K[^\s]+')
          if [[ -z "$version" ]]; then
            echo "Could not parse released version from output" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sign Docker image
        if: ${{ inputs.dry_run != true }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: cosign sign --yes rocicorp/zero:$VERSION

      - name: Promote latest tags
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'stable' && inputs.promote_latest && inputs.dry_run != true }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          node packages/zero/tool/make-latest.js "$VERSION"

      - name: Sign Docker latest
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'stable' && inputs.promote_latest && inputs.dry_run != true }}
        run: cosign sign --yes rocicorp/zero:latest

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## Canary Release Published

          **npm:** \`@rocicorp/zero@${{ steps.release.outputs.version }}\`
          \`\`\`
          npm install @rocicorp/zero@${{ steps.release.outputs.version }}
          \`\`\`

          **Docker:** \`rocicorp/zero:${{ steps.release.outputs.version }}\`"
