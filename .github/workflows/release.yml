name: Release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        type: choice
        options:
          - canary
          - stable
      ref:
        description: Branch, tag, or commit SHA to build the release from
        required: true
        type: string
      promote_latest:
        description: Promote the published version to npm and Docker latest (stable only)
        required: false
        type: boolean
        default: true
      dry_run:
        description: Build but skip git push, npm publish, and Docker push
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release-canary'))
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write # Required to push release tags.
      id-token: write # Required for cosign keyless signing.
      pull-requests: write # Required to comment on canary release PRs.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # zizmor: ignore[artipacked] release.ts needs checkout credentials to push release tags.
        with:
          fetch-depth: 0
          persist-credentials: true
          # Always check out the workflow branch so pnpm tooling is current.
          # release.ts handles checking out the target ref internally.

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.3.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "release-bot@rocicorp.dev"
          git config --global user.name "Rocicorp Release Bot"

      - run: pnpm install --frozen-lockfile

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run release
        id: release
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'canary' }}
          REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.pull_request.base.ref }}
          DRY_RUN: ${{ inputs.dry_run == true && '--dry-run' || '' }}
        run: |
          set -euo pipefail

          if [[ ! "$REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Invalid ref: $REF" >&2
            exit 1
          fi

          output=$(node packages/zero/tool/release.ts "$MODE" "$REF" --yes $DRY_RUN 2>&1 | tee /dev/stderr)
          version=$(echo "$output" | grep -oP '(?:Published|Would publish) @rocicorp/zero@\K[^\s]+')
          if [[ -z "$version" ]]; then
            echo "Could not parse released version from output" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sign Docker image
        if: ${{ inputs.dry_run != true }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: cosign sign --yes rocicorp/zero:$VERSION

      - name: Promote latest tags
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'stable' && inputs.promote_latest && inputs.dry_run != true }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          node packages/zero/tool/make-latest.js "$VERSION"

      - name: Sign Docker latest
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'stable' && inputs.promote_latest && inputs.dry_run != true }}
        run: cosign sign --yes rocicorp/zero:latest

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          {
            printf '## Canary Release Published\n\n'
            printf '**npm:** `%s`\n' "@rocicorp/zero@$VERSION"
            printf '```\n'
            printf 'npm install @rocicorp/zero@%s\n' "$VERSION"
            printf '```\n\n'
            printf '**Docker:** `%s`\n' "rocicorp/zero:$VERSION"
          } > release-comment.md
          gh pr comment "$PR_NUMBER" --body-file release-comment.md
