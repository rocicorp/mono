name: Canary Release

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  canary-release:
    name: Canary Release
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release-canary')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: npm ci

      - name: Run canary release
        id: release
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          if [[ ! "$BASE_REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Invalid base ref: $BASE_REF" >&2
            exit 1
          fi

          output=$(node packages/zero/tool/release.ts canary "$BASE_REF" --yes 2>&1 | tee /dev/stderr)
          version=$(echo "$output" | grep -oP 'Published @rocicorp/zero@\K[^\s]+')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## Canary Release Published

          **npm:** \`@rocicorp/zero@${{ steps.release.outputs.version }}\`
          \`\`\`
          npm install @rocicorp/zero@${{ steps.release.outputs.version }}
          \`\`\`

          **Docker:** \`rocicorp/zero:${{ steps.release.outputs.version }}\`"
