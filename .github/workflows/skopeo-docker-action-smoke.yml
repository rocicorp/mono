name: Skopeo Docker Action Smoke

on:
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: skopeo-docker-action-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Test pinned Skopeo image
    runs-on: ubuntu-latest
    steps:
      - name: Check Skopeo args
        uses: docker://quay.io/containers/skopeo:v1.22.2@sha256:e268031b80e65ba25dd2020383232587daf0ae670727b5ccdbe7a0008e9216bc
        with:
          args: --version

      - name: Create output directories
        run: mkdir -p dist/docker copied-image

      - name: Create OCI archive with Skopeo
        uses: docker://quay.io/containers/skopeo:v1.22.2@sha256:e268031b80e65ba25dd2020383232587daf0ae670727b5ccdbe7a0008e9216bc
        with:
          args: >-
            copy --all
            docker://registry.k8s.io/pause:3.10
            oci-archive:dist/docker/pause.tar:registry.k8s.io/pause:3.10

      - name: Copy OCI archive with Skopeo
        uses: docker://quay.io/containers/skopeo:v1.22.2@sha256:e268031b80e65ba25dd2020383232587daf0ae670727b5ccdbe7a0008e9216bc
        with:
          args: >-
            copy --all
            oci-archive:dist/docker/pause.tar
            dir:copied-image

      - name: Verify outputs
        run: |
          test -s dist/docker/pause.tar
          test -f copied-image/manifest.json
