name: 'Setup Docker'
description: 'Ensure Docker is installed (>= v25) and running.'

runs:
  using: 'composite'
  steps:
    - name: Ensure Docker is installed and running
      shell: bash
      run: |
        # -o DPkg::Lock::Timeout waits for the lock instead of failing (safe for parallel jobs)
        sudo apt-get install -y -o DPkg::Lock::Timeout=120 docker.io
        sudo systemctl enable --now docker
        sudo usermod -aG docker "$(whoami)" || true
